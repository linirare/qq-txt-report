<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>📊 QQ修仙群聊 · 开服首日分析报告</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#f5f7fa;color:#1f2937;line-height:1.6;padding:10px}
.container{max-width:960px;margin:0 auto}
.header{background:linear-gradient(135deg,#fff,#f0f4ff,#e8eefd);border-radius:16px;padding:24px 16px;margin:8px 0 14px;text-align:center;border:1px solid rgba(26,86,219,0.15)}
.header h1{font-size:1.4em;color:#1a56db}
.header .sub{color:#6b7280;margin-top:4px;font-size:0.85em}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.stat-card{background:#fff;border-radius:12px;padding:14px 6px;text-align:center;border:1px solid rgba(26,86,219,0.1)}
.stat-card .n{font-size:1.5em;font-weight:700;color:#1f2937}
.stat-card .l{font-size:0.7em;color:#6b7280;margin-top:2px}
.section{background:#fff;border-radius:14px;padding:16px 14px;margin-bottom:12px;border:1px solid rgba(26,86,219,0.08)}
.section h2{font-size:1.1em;color:#1f2937;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(26,86,219,0.12)}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:640px){.stats-grid{grid-template-columns:repeat(2,1fr)}.chart-grid{grid-template-columns:1fr}}

/* 话题卡片 */
.tc{border-radius:10px;padding:12px;margin-bottom:8px;border-left:4px solid}
.tc .th{display:flex;justify-content:space-between;align-items:flex-start;cursor:pointer}
.tc .tt{font-size:0.95em;font-weight:600;color:#1f2937;flex:1}
.tc .btn{flex-shrink:0;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s;margin-left:8px;color:#fff}
.tc .btn.on{transform:rotate(45deg);background:#6b7280!important}
.tc .desc{color:#4b5563;font-size:0.82em;line-height:1.6;margin:6px 0}
.tc .tags{display:flex;gap:6px;flex-wrap:wrap}
.tc .tag{display:inline-block;padding:2px 10px;border-radius:20px;font-size:0.7em;background:rgba(220,38,38,0.08);border:1px solid rgba(220,38,38,0.3)}
.snips{overflow:hidden;max-height:0;transition:max-height 0.4s;margin-top:6px}
.snips.open{max-height:2000px}

/* 对话气泡 */
.ctx{padding:4px 10px;margin:3px 0;background:#f8fafc;border-radius:6px;border-left:3px solid;font-size:0.82em}
.ctx .u{font-weight:600}
.ctx .t{color:#374151}
.ctx.hl{background:#eef4ff;border-left-color:#1a56db!important}
.ctx.hl .u{color:#1a56db}
.ctx.hl .t{font-weight:500}
.ctx .num{display:inline-block;font-size:0.7em;padding:1px 6px;border-radius:3px;margin-right:4px;color:#fff}

/* 反馈 */
.fb{padding:10px;border-bottom:1px solid rgba(26,86,219,0.06)}
.fb:last-child{border-bottom:none}
.fb .fh{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.fb .fl{display:flex;gap:8px;align-items:flex-start;flex:1}
.fb .txt{font-size:0.82em;color:#4b5563}
.fb .issue{color:#dc2626;font-weight:600}
.fb .status{color:#059669}
.fb .meta{display:flex;gap:6px;align-items:center;flex-shrink:0;margin-left:8px}
.fb .cnt{font-size:0.75em;color:#6b7280;background:#f0f2f5;padding:2px 8px;border-radius:10px}

/* 关键词人物 */
.kws{margin-bottom:14px}
.kws h3{font-size:0.85em;color:#1a56db;margin-bottom:6px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.kw-bar{display:flex;align-items:center;gap:6px;margin:3px 0}
.kw-bar .nm{width:56px;font-size:0.78em;color:#374151;text-align:right;flex-shrink:0}
.kw-bar .bg{flex:1;height:16px;background:#eef1f5;border-radius:8px;overflow:hidden}
.kw-bar .fl{height:100%;border-radius:8px;min-width:3px}
.kw-bar .ct{width:24px;font-size:0.75em;color:#6b7280;text-align:right}
.person-list{margin-top:6px;border-top:1px dashed #e0e4e8;padding-top:6px}
.person-item{cursor:pointer;padding:4px 8px;margin:2px 0;border-radius:4px;display:flex;justify-content:space-between;align-items:center;font-size:0.82em;background:#fafbfc}
.person-item:hover{background:#eef4ff}
.person-item .pn{font-weight:600;color:#374151}
.person-item .pc{color:#6b7280;font-size:0.78em}
.person-msgs{overflow:hidden;max-height:0;transition:max-height 0.3s;padding-left:16px}
.person-msgs.open{max-height:500px}
.person-msgs .pm{font-size:0.78em;color:#4b5563;padding:2px 6px;margin:1px 0;border-left:2px solid #d0d5dd}

/* 风险/可取 */
.risk-item{margin-bottom:10px}
.risk-item .rh{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.risk-item .rt{font-size:0.85em;font-weight:500;flex:1}
.risk-item .re{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;flex-shrink:0;margin-left:6px}
.risk-item .re.on{transform:rotate(45deg);background:#6b7280!important;color:#fff!important}
.risk-item .rd{font-size:0.78em;color:#6b7280;background:#fff;border-radius:6px;padding:6px 8px;margin:4px 0;border:1px solid rgba(230,57,70,0.1)}

/* 心理卡片 */
.psych-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:640px){.psych-grid{grid-template-columns:1fr}}
.psych-item{background:#fafbfc;border-radius:8px;padding:12px 14px;border:1px solid #eef1f5;border-left:4px solid}
.psych-item .ph{display:flex;justify-content:space-between;margin-bottom:2px}
.psych-item .pn{font-weight:600;font-size:0.85em}
.psych-item .pc{font-weight:600;font-size:0.8em}
.psych-item .pd{color:#5a6a7a;font-size:0.78em;line-height:1.5;margin-bottom:4px}

/* 冷知识 */
.tip-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.tip{background:#fafbfc;border-radius:8px;padding:10px;border:1px solid #eef1f5}
.tip .tl{font-size:0.78em;font-weight:600;color:#2980b9}
.tip .tc{font-size:0.8em;color:#4b5563;margin-top:2px}
.footer{text-align:center;padding:20px;color:#9ca3af;font-size:0.78em}
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
let D = null; // data injected below
const COLORS = {'传功限制争议':'#E63946','充值竞争与排行榜':'#F4A261','国战系统初体验':'#2A9D8F',
  '肝度与自动化争议':'#E76F51','概率/数值信任危机':'#9B59B6'};
const TAG_COLORS = {'付费体验':'#dc2626','系统设计':'#7c3aed','氪佬':'#f59e0b','付费点':'#f59e0b',
  '排行榜':'#3b82f6','数值':'#8b5cf6','国战':'#059669','平衡':'#ea580c','活动设计':'#0891b2',
  '肝度':'#d97706','付费墙':'#dc2626','概率公示':'#7c3aed','信任':'#0891b2'};
const NUM_CN = ['一','二','三','四','五','六'];

function render(){
  const d = D; if(!d) return;
  let h = '';

  // Header
  h += `<div class="header"><h1>📊 QQ修仙群聊 · 开服首日报告</h1><div class="sub">${d.totalMsgs}条消息 · ${d.totalUsers}名活跃成员</div>
    <div class="stats-grid">${[['💬',d.totalMsgs,'文本消息'],['👥',d.totalUsers,'活跃成员'],['🏷️','60+','关键词'],['😊','67','表情']].map(s=>
      `<div class="stat-card"><div style="font-size:1.3em">${s[0]}</div><div class="n">${s[1]}</div><div class="l">${s[2]}</div></div>`
    ).join('')}</div></div>`;

  // 时段&关键词
  const hrs = Object.keys(d.hourly);
  const hvs = Object.values(d.hourly);
  const maxH = Math.max(...hvs);
  h += `<div class="chart-grid">
    <div class="section"><h2>📈 时段活跃曲线</h2>
      <div style="display:flex;align-items:flex-end;height:150px;padding:0 8px">${hrs.map((k,i)=>{
        const pct = hvs[i]/maxH*100;
        return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;height:150px;justify-content:flex-end">
          <div style="font-size:10px;color:#2c3e50;font-weight:600;margin-bottom:2px">${hvs[i]}</div>
          <div style="width:80%;max-width:32px;height:${pct}%;background:linear-gradient(180deg,#4a9bc7,#1a6bb5);border-radius:4px 4px 2px 2px"></div>
          <div style="font-size:9px;color:#6b7280;margin-top:4px">${k}:00</div></div>`;
      }).join('')}</div>
      <div style="text-align:center;color:#6b7280;font-size:0.72em;margin-top:6px">高峰 18:00（196条）· 整体递减</div></div>
    <div class="section"><h2>🔑 关键词分布</h2>
      ${[['传功/养成',77,'#E63946'],['氪金/付费',83,'#F4A261'],['战斗/国战',41,'#2A9D8F'],['角色/英雄',30,'#3498db'],['功能/系统',45,'#9B59B6'],['玩家吐槽',21,'#E76F51']].map(([n,v,c])=>{
        const w = v/83*100;
        return `<div style="display:flex;align-items:center;gap:6px;margin:4px 0">
          <span style="width:64px;font-size:0.76em;color:#374151;text-align:right;flex-shrink:0">${n}</span>
          <div style="flex:1;height:16px;background:#eef1f5;border-radius:6px;overflow:hidden">
            <div style="height:100%;width:${w}%;background:${c};border-radius:6px"></div></div>
          <span style="width:20px;font-size:0.72em;color:#6b7280">${v}</span></div>`;
      }).join('')}</div></div>`;

  // 热门话题
  h += `<div class="section"><h2>🔥 热门话题</h2>`;
  d.topics.forEach(t => {
    const convs = d.topicConvs[t.id] || [];
    h += `<div class="tc" style="border-left-color:${COLORS[t.title]||'#E63946'}">
      <div class="th" onclick="tg('s_${t.id}')">
        <div class="tt">${t.title}</div>
        <div class="btn" id="b_s_${t.id}" style="background:${COLORS[t.title]||'#E63946'}">+</div></div>
      <div class="desc">${t.desc}</div>
      <div class="snips" id="s_${t.id}">${convs.map((c,i)=>`<div style="margin-bottom:8px;background:#fafbfc;border-radius:6px;padding:8px"><div style="font-size:0.78em;font-weight:600;color:${COLORS[t.title]||"#E63946"};margin-bottom:4px">📌 会话片段 ${NUM_CN[i]||""}</div>${c}</div>`).join("")}</div></div>`;
      <div class="snips" id="s_${t.id}">${convs.map((c,i)=>`<div class="ctx hl"><span class="num" style="background:${COLORS[t.title]||'#E63946'}">${NUM_CN[i]||''}</span>${c}</div>`).join('')}</div></div>`;
  });
  h += `</div>`;

  // 活跃成员
  h += `<div class="section"><h2>👤 最活跃成员</h2>`;
  d.topUsers.forEach(([name,count],i)=>{
    const w = count/d.topUsers[0][1]*100;
    h += `<div style="display:flex;align-items:center;gap:8px;margin:4px 0">
      <span style="width:56px;font-size:0.76em;color:#374151;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0">${name}</span>
      <div style="flex:1;height:18px;background:#eef1f5;border-radius:9px;overflow:hidden">
        <div style="height:100%;width:${w}%;background:${['#FF6B35','#004E89','#E63946','#2A9D8F','#7B2D8E','#264653'][i]};border-radius:9px"></div></div>
      <span style="width:20px;font-size:0.76em;color:#2980b9;font-weight:600;text-align:right">${count}</span></div>`;
  });
  h += `</div>`;

  // 成员角色
  const roles = [['雍和',88,'核心活跃/0氪排22','#FF6B35'],['123',40,'活跃/氪6元','#004E89'],
    ['佩恩没pain',40,'氪金大R/冲榜','#E63946'],['雾随雨落',19,'0氪活跃反馈','#2A9D8F'],
    ['●。樹o、',41,'群管理员','#7B2D8E'],['朗朗',40,'活跃/自称榜二','#264653'],
    ['哟哟',24,'活跃/攻略流','#287271'],['张某人',20,'反馈肝度','#E76F51']];
  h += `<div class="section"><h2>💡 成员角色</h2><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">${
    roles.map(r=>`<div style="background:#fafbfc;border-radius:8px;padding:10px 6px;text-align:center;border:1px solid #eef1f5">
      <div style="font-size:0.78em;font-weight:600;color:${r[3]}">${r[0]}</div>
      <div style="font-size:1em;font-weight:700;color:#2980b9;margin:2px 0">${r[1]}</div>
      <div style="font-size:0.6em;color:#8899cc">${r[2]}</div></div>`
    ).join('')}</div></div>`;

  // 玩家反馈
  h += `<div class="section"><h2>📝 玩家反馈 产品建议</h2>`;
  d.feedbacks.forEach(f => {
    const convs = d.fbConvs[f.id] || [];
    h += `<div class="fb">
      <div class="fh" onclick="tg('fb_${f.id}')">
        <div class="fl">
          <div style="font-size:0.95em">${f.emoji}</div>
          <div class="txt"><span class="issue">${f.issue}</span> · ${f.desc||''} ${f.status?`<span class="status">${f.status}</span>`:''}</div></div>
        <div class="meta">
          <span class="cnt">${f.count}条</span>
      <div class="snips" id="fb_${f.id}">${convs.map((c,i)=>`<div style="margin-bottom:6px;background:#fafbfc;border-radius:6px;padding:6px"><div style="font-size:0.78em;font-weight:600;color:#6b7280;margin-bottom:3px">📌 会话片段 ${NUM_CN[i]||""}</div>${c}</div>`).join("")}</div></div>`;
      <div class="snips" id="fb_${f.id}">${convs.map((c,i)=>`<div class="ctx hl"><span class="num" style="background:#6b7280">${NUM_CN[i]||''}</span>${c}</div>`).join('')}</div></div>`;
  });
  h += `</div>`;

  // 关键词频次明细 + 人物分布
  h += `<div class="section"><h2>🔤 关键词频次明细</h2>
    <div class="kws"><h3 onclick="tg('kp_0')">🔴 传功/养成（77次）<span style="font-size:12px;color:#6b7280" id="b_kp_0">+</span></h3>
      ${[['养',20,'#E63946'],['传功',17,'#E63946'],['资质',12,'#E63946'],['元婴',6,'#E63946'],['金丹',3,'#E63946']].map(([n,v,c])=>
        `<div class="kw-bar"><span class="nm">${n}</span><div class="bg"><div class="fl" style="width:${v/20*100}%;background:${c}"></div></div><span class="ct">${v}</span></div>`
      ).join('')}
      <div class="snips" id="kp_0"><div class="person-list">${renderPersonList(d.kwPeople,0)}</div></div></div>
    <div class="kws"><h3 onclick="tg('kp_1')">🟠 氪金/付费（83次）<span style="font-size:12px;color:#6b7280" id="b_kp_1">+</span></h3>
      ${[['充',27,'#F4A261'],['氪',14,'#F4A261'],['抽',9,'#F4A261'],['首充',5,'#F4A261']].map(([n,v,c])=>
        `<div class="kw-bar"><span class="nm">${n}</span><div class="bg"><div class="fl" style="width:${v/27*100}%;background:${c}"></div></div><span class="ct">${v}</span></div>`
      ).join('')}
      <div class="snips" id="kp_1"><div class="person-list">${renderPersonList(d.kwPeople,1)}</div></div></div>
    <div class="kws"><h3 onclick="tg('kp_2')">🟡 玩家吐槽（21次）<span style="font-size:12px;color:#6b7280" id="b_kp_2">+</span></h3>
      ${[['离谱',2,'#E76F51'],['恶心',1,'#E76F51'],['劝退',1,'#E76F51'],['无语',1,'#E76F51']].map(([n,v,c])=>
        `<div class="kw-bar"><span class="nm">${n}</span><div class="bg"><div class="fl" style="width:${v/2*100}%;background:${c}"></div></div><span class="ct">${v}</span></div>`
      ).join('')}
      <div class="snips" id="kp_2"><div class="person-list">${renderPersonList(d.kwPeople,2)}</div></div></div></div>`;

  // 玩家反馈与心理分析
  h += `<div class="section"><h2>🧠 玩家反馈与心理分析</h2><div class="psych-grid">`;
  d.psychs.forEach(p => {
    const convs = d.psychConvs[p.name] || [];
    h += `<div class="psych-item" style="border-left-color:${p.color}">
      <div class="ph"><span class="pn" style="color:${p.color}">${p.name}</span></div>
      <div class="pd">${p.desc}</div>
      <div style="cursor:pointer" onclick="tg('ps_${p.name.replace(/[（）]/g,'')}')">
      <div class="snips" id="ps_${p.name.replace(/[（）]/g,"")}">${convs.map((c,i)=>`<div style="margin-bottom:6px;background:#fafbfc;border-radius:6px;padding:6px"><div style="font-size:0.78em;font-weight:600;color:${p.color};margin-bottom:3px">📌 会话片段 ${NUM_CN[i]||""}</div>${c}</div>`).join("")}</div></div>`;
      <div class="snips" id="ps_${p.name.replace(/[（）]/g,'')}">${convs.map((c,i)=>`<div class="ctx hl" style="border-left-color:${p.color}"><span class="num" style="background:${p.color}">${NUM_CN[i]||''}</span>${c}</div>`).join('')}</div></div>`;
  });
  h += `</div></div>`;

  // 游戏冷知识
  const tips = [['🎫 兑换码','VIP666 / VIP777 / VIP888'],['🔑 暗号口令','"阿爹笑，拍我腰，男儿立志在远方"'],['🎯 前期策略','集中养1个主力，优先全属性+词条'],['⚡ 资质玄学','别连点，点一次退出来等会儿再点'],['🏠 10连采集','宗门8级解锁10连，不用月卡'],['⚔️ 国战规则','1人控1个修士，死了可满血重进'],['🏆 传功位置','宗祠→NPC王长生，创角24小时'],['📖 解锁小天师','先看完剧情才能抽皮肤']];
  h += `<div class="section"><h2>💡 游戏冷知识</h2><div class="tip-grid">${
    tips.map(t=>`<div class="tip"><div class="tl">${t[0]}</div><div class="tc">${t[1]}</div></div>`).join('')}</div></div>`;

  // 数据洞察
  h += `<div class="section"><h2>📊 数据洞察</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">`;
  // 风险项
  h += `<div style="background:#f8fafc;border-radius:10px;padding:12px;border:1px solid rgba(230,57,70,0.2)">
    <h3 style="font-size:0.85em;margin-bottom:8px;color:#E63946">🚨 主要风险项</h3>`;
  d.risks.forEach(r => {
    const convs = d.riskConvs[r.id] || [];
    h += `<div class="risk-item">
      <div class="rh" onclick="tg('risk_${r.id}')">
        <div class="rt" style="color:${r.color}">🔴 ${r.title}</div>
        <div class="re" id="b_risk_${r.id}" style="background:${r.color}22;color:${r.color}">+</div></div>
      <div class="snips" id="risk_${r.id}">${convs.map((c,i)=>`<div style="margin-bottom:6px;background:#fafbfc;border-radius:6px;padding:6px"><div style="font-size:0.78em;font-weight:600;color:#E63946;margin-bottom:3px">📌 会话片段 ${NUM_CN[i]||""}</div>${c}</div>`).join("")}</div></div>`;
      <div class="snips" id="risk_${r.id}">${convs.map((c,i)=>`<div class="ctx hl"><span class="num" style="background:#E63946">${NUM_CN[i]||''}</span>${c}</div>`).join('')}</div></div>`;
  });
  h += `</div>`;
  // 可取之处
  h += `<div style="background:#f8fafc;border-radius:10px;padding:12px;border:1px solid rgba(42,157,143,0.2)">
    <h3 style="font-size:0.85em;margin-bottom:8px;color:#2A9D8F">✅ 可取之处</h3>`;
  d.goods.forEach(g => {
    const convs = d.goodConvs[g.id] || [];
    h += `<div class="risk-item">
      <div class="rh" onclick="tg('good_${g.id}')">
        <div class="rt" style="color:${g.color}">🟢 ${g.title}</div>

function renderPersonList(kwPeople, idx){
  const items = kwPeople[idx] || [];
  return items.map((item, pi) => {
    const msgs = item.msgs || [];
    return `<div class="person-item" onclick="tg('pm_${idx}_${pi}')">
      <span class="pn">${item.user}</span>
      <span class="pc">${msgs.length}条消息 <span style="color:#2980b9">+</span></span></div>

        msgs.map(m => `<div class="pm">${m}</div>`).join('')
      }</div>`;
  }).join('');
}
