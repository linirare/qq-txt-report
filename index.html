<!DOCTYPE html>

<head>

<title>📊 QQ修仙群聊 · 开服首日分析报告</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#f5f7fa;color:#1f2937;padding:10px}
.container{max-width:960px;margin:0 auto}
.header{background:linear-gradient(135deg,#fff,#f0f4ff,#e8eefd);border-radius:16px;padding:24px 16px;margin:8px 0 14px;text-align:center;border:1px solid rgba(26,86,219,0.15)}
.header h1{font-size:1.4em;color:#1a56db;margin-bottom:4px}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:14px 0}
.sc{background:#fff;border-radius:12px;padding:14px 6px;text-align:center;border:1px solid rgba(26,86,219,0.1)}
.sc .n{font-size:1.5em;font-weight:700}
.se{background:#fff;border-radius:14px;padding:16px 14px;margin-bottom:12px;border:1px solid rgba(26,86,219,0.08)}
.se h2{font-size:1.1em;color:#1f2937;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(26,86,219,0.12)}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:640px){.sg{grid-template-columns:repeat(2,1fr)}.cg{grid-template-columns:1fr}}
.tc{border-radius:10px;padding:12px;margin-bottom:8px;border-left:4px solid;cursor:pointer}
.tc:hover{background:#f8faff}
.tc .tt{font-size:0.95em;font-weight:600}
.tc .desc{color:#4b5563;font-size:0.82em;line-height:1.6;margin:6px 0}
.kw{margin-bottom:14px}
.kw h3{font-size:0.85em;color:#1a56db;margin-bottom:6px}
.kb{display:flex;align-items:center;gap:6px;margin:3px 0}
.kb .nm{width:56px;font-size:0.78em;color:#374151;text-align:right;flex-shrink:0}
.kb .bg{flex:1;height:16px;background:#eef1f5;border-radius:8px;overflow:hidden}
.kb .fl{height:100%;border-radius:8px}
.kb .ct{width:24px;font-size:0.75em;color:#6b7280;text-align:right}
.pi{cursor:pointer;padding:4px 8px;margin:2px 0;border-radius:4px;display:flex;justify-content:space-between;font-size:0.82em;background:#fafbfc}
.pi:hover{background:#eef4ff}
.pm{display:none;padding-left:16px}
.pm.on{display:block}
.pm .m{font-size:0.78em;color:#4b5563;padding:2px 6px;margin:1px 0;border-left:2px solid #d0d5dd}
.fb{padding:10px;border-bottom:1px solid rgba(26,86,219,0.06);cursor:pointer}
.fb:hover{background:#f8faff}
.ri{margin-bottom:10px}
.ri .rt{font-size:0.85em;font-weight:500;cursor:pointer}
.ri .rd{font-size:0.78em;color:#6b7280;background:#fff;border-radius:6px;padding:6px 8px;margin:4px 0}
.pg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:640px){.pg{grid-template-columns:1fr}}
.pc{background:#fafbfc;border-radius:8px;padding:12px 14px;border:1px solid #eef1f5;border-left:4px solid}
.pc .pn{font-weight:600;font-size:0.85em}
.pc .pd{color:#5a6a7a;font-size:0.78em;line-height:1.5}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tg{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ti{background:#fafbfc;border-radius:8px;padding:10px;border:1px solid #eef1f5}
.ti .tl{font-size:0.78em;font-weight:600;color:#2980b9}
.cv{background:#fafbfc;border-radius:6px;padding:8px;margin-bottom:8px}
.cv .lb{font-size:0.78em;font-weight:600;margin-bottom:4px}
.ctx{background:#f8fafc;border-radius:6px;padding:4px 10px;margin:2px 0;border-left:3px solid;font-size:0.82em}
.sn{display:none;margin-top:6px}
.sn.on{display:block}
.arr{font-size:12px;color:#6b7280;margin-left:4px;transition:transform 0.2s;display:inline-block}
.arr.rt{transform:rotate(90deg)}
.footer{text-align:center;padding:20px;color:#9ca3af;font-size:0.78em}
</style>
</head>

  var kd = [['传功/养成',77,'#E63946'],['氪金/付费',83,'#F4A261'],['战斗/国战',41,'#2A9D8F'],['角色/英雄',30,'#3498db'],['功能/系统',45,'#9B59B6'],['玩家吐槽',21,'#E76F51']];

  // 反馈
  h += '<div class="se"><h2>📝 玩家反馈 产品建议</h2>';
  for(var i=0;i<d.feedbacks.length;i++){
    var f = d.feedbacks[i];
    var convs = d.fbConvs[f.id]||[];
    h += '<div class="fb" data-i="' + i + '" data-type="fb"><div style="display:flex;justify-content:space-between;align-items:center"><div style="display:flex;gap:8px;align-items:flex-start;flex:1"><span>' + f.emoji + '</span><span style="font-size:0.82em;color:#4b5563"><b style="color:#dc2626">' + f.issue + '</b> ' + (f.desc||'') + ' <span style="color:#059669">' + (f.status||'') + '</span></span></div><span style="font-size:0.75em;color:#6b7280;background:#f0f2f5;padding:2px 8px;border-radius:10px">' + f.count + '条</span></div><div class="sn" data-id="fb' + i + '">';

  h += '<div class="se"><h2>🔤 关键词频次明细</h2>';
  var kwN = ['传功/养成','氪金/付费','玩家吐槽'];
  var kwB = [
    [['养',20,'#E63946'],['传功',17,'#E63946'],['资质',12,'#E63946']],
    [['充',27,'#F4A261'],['氪',14,'#F4A261'],['抽',9,'#F4A261']],
    [['离谱',2,'#E76F51'],['恶心',1,'#E76F51'],['劝退',1,'#E76F51']]
  ];
  for(var ki=0;ki<3;ki++){
    h += '<div class="kw"><h3>' + (ki===0?'🔴':ki===1?'🟠':'🟡') + ' ' + kwN[ki] + ' <span class="arr" data-i="' + ki + '" data-type="kw">▶</span></h3>';
    for(var b=0;b<kwB[ki].length;b++){
      var wb = kwB[ki][b][1]/kwB[ki][0][1]*100;
      h += '<div class="kb"><span class="nm">' + kwB[ki][b][0] + '</span><div class="bg"><div class="fl" style="width:' + wb + '%;background:' + kwB[ki][b][2] + '"></div></div><span class="ct">' + kwB[ki][b][1] + '</span></div>';
    }
    var people = d.kwPeople[ki]||[];
    h += '<div class="sn" data-id="kw' + ki + '"><div style="border-top:1px dashed #e0e4e8;padding-top:6px">';
    for(var p=0;p<people.length;p++){
      h += '<div class="pi" data-ki="' + ki + '" data-pi="' + p + '" data-type="person"><span>' + people[p].user + '</span><span style="color:#6b7280;font-size:0.78em">' + (people[p].msgs||[]).length + '条 <span class="arr" style="font-size:10px">▶</span></span></div><div class="pm" data-id="pm' + ki + '_' + p + '">';
      var msgs = people[p].msgs||[];
      for(var m=0;m<msgs.length;m++){
        h += '<div class="m">' + msgs[m] + '</div>';
      }
      h += '</div>';
    }
    h += '</div></div></div>';
  }
  h += '</div>';

  // 心理分析
  h += '<div class="se"><h2>🧠 玩家反馈与心理分析</h2><div class="pg">';
  for(var i=0;i<d.psychs.length;i++){
    var p = d.psychs[i];
    var convs = d.psychConvs[p.name]||[];
    h += '<div class="pc" style="border-left-color:' + p.color + '"><div class="pn" style="color:' + p.color + '">' + p.name + '</div><div class="pd">' + p.desc + '</div><div style="cursor:pointer;font-size:0.78em;color:#2980b9" data-i="' + i + '" data-type="psych">查看对话场景 <span class="arr">▶</span></div><div class="sn" data-id="psych' + i + '">';

    h += '</div></div>';
  }
  h += '</div></div>';

  var tips = [['🎫 兑换码','VIP666 / VIP777 / VIP888'],['🔑 暗号口令','阿爹笑拍我腰男儿立志在远方'],['🎯 前期策略','集中养1个主力带全属性词条'],['⚡ 资质玄学','别连点，点一次退出来再点'],['🏠 10连采集','宗门8级解锁10连不用月卡'],['⚔️ 国战规则','1人控1个修士死了可重进'],['🏆 传功位置','宗祠NPC王长生创角24小时'],['📖 解锁小天师','先看完剧情才能抽皮肤']];

    var r = d.risks[i];

  h += '<div style="background:#f8fafc;border-radius:10px;padding:12px;border:1px solid rgba(42,157,143,0.2)"><h3 style="font-size:0.85em;margin-bottom:8px;color:#2A9D8F">✅ 可取之处</h3>';
  for(var i=0;i<d.goods.length;i++){
    var g = d.goods[i];
    var convs = d.goodConvs[g.id]||[];
    h += '<div class="ri"><div class="rt" data-i="' + i + '" data-type="good">🟢 ' + g.title + ' <span class="arr">▶</span></div><div class="rd">📋 ' + g.desc + '</div><div class="sn" data-id="good' + i + '">';
    for(var j=0;j<convs.length;j++){
      h += '<div class="cv"><div class="lb" style="color:#2A9D8F">📌 会话片段 ' + '一二三四五'.charAt(j) + '</div>' + convs[j] + '</div>';
    }
    h += '</div></div>';
  }
  h += '</div></div></div>';

  h += '<div class="footer"><p>📊 NapCatQQ 群聊记录 · 数据驱动生成</p></div>';
  document.getElementById('app').innerHTML = h;
}

// 事件委托：点击展开/收起
document.addEventListener('click', function(e){
  var target = e.target.closest('[data-type]');
  if(!target) return;
  var type = target.getAttribute('data-type');
  
  if(type === 'topic' || type === 'fb'){
    var idx = target.getAttribute('data-i');
    var sn = document.querySelector('[data-id="' + type + idx + '"]');
    if(sn) sn.classList.toggle('on');
    var arr = target.querySelector('.arr');
    if(arr) arr.classList.toggle('rt');
  }
  else if(type === 'kw'){
    var ki = target.getAttribute('data-i');
    var sn = document.querySelector('[data-id="kw' + ki + '"]');
    if(sn) sn.classList.toggle('on');
    var arr = target.querySelector('.arr');
    if(arr) arr.classList.toggle('rt');
  }
  else if(type === 'person'){
    var ki = target.getAttribute('data-ki');
    var pi = target.getAttribute('data-pi');
    var pm = document.querySelector('[data-id="pm' + ki + '_' + pi + '"]');
    if(pm) pm.classList.toggle('on');
  }
  else if(type === 'psych'){
    var i = target.getAttribute('data-i');
    var sn = document.querySelector('[data-id="psych' + i + '"]');
    if(sn) sn.classList.toggle('on');
    var arr = target.querySelector('.arr');
    if(arr) arr.classList.toggle('rt');
  }
  else if(type === 'risk' || type === 'good'){
    var i = target.getAttribute('data-i');
    var sn = document.querySelector('[data-id="' + type + i + '"]');
    if(sn) sn.classList.toggle('on');
    var arr = target.querySelector('.arr');
    if(arr) arr.classList.toggle('rt');
  }
});
</script>
