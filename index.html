<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>📊 QQ修仙群聊 · 开服首日分析报告</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#f5f7fa;color:#1f2937;padding:10px}
.container{max-width:960px;margin:0 auto}
.header{background:linear-gradient(135deg,#fff,#f0f4ff,#e8eefd);border-radius:16px;padding:24px 16px;margin:8px 0 14px;text-align:center;border:1px solid rgba(26,86,219,0.15)}
.header h1{font-size:1.4em;color:#1a56db;margin-bottom:4px}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:14px 0}
.sc{background:#fff;border-radius:12px;padding:14px 6px;text-align:center;border:1px solid rgba(26,86,219,0.1)}
.sc .n{font-size:1.5em;font-weight:700}
.se{background:#fff;border-radius:14px;padding:16px 14px;margin-bottom:12px;border:1px solid rgba(26,86,219,0.08)}
.se h2{font-size:1.1em;color:#1f2937;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(26,86,219,0.12)}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:640px){.sg{grid-template-columns:repeat(2,1fr)}.cg{grid-template-columns:1fr}}
.tc{border-radius:10px;padding:12px;margin-bottom:8px;border-left:4px solid;cursor:pointer}
.tc:hover{background:#f8faff}
.tc .tt{font-size:0.95em;font-weight:600}
.tc .desc{color:#4b5563;font-size:0.82em;line-height:1.6;margin:6px 0}
.fb{padding:10px;border-bottom:1px solid rgba(26,86,219,0.06);cursor:pointer}
.fb:hover{background:#f8faff}
.ri{margin-bottom:10px}
.ri .rt{font-size:0.85em;font-weight:500;cursor:pointer}
.ri .rd{font-size:0.78em;color:#6b7280;background:#fff;border-radius:6px;padding:6px 8px;margin:4px 0}
.pg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:640px){.pg{grid-template-columns:1fr}}
.pc{background:#fafbfc;border-radius:8px;padding:12px 14px;border:1px solid #eef1f5;border-left:4px solid}
.pc .pn{font-weight:600;font-size:0.85em}
.pc .pd{color:#5a6a7a;font-size:0.78em;line-height:1.5}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tg{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ti{background:#fafbfc;border-radius:8px;padding:10px;border:1px solid #eef1f5}
.ti .tl{font-size:0.78em;font-weight:600;color:#2980b9}
.cv{background:#fafbfc;border-radius:6px;padding:8px;margin-bottom:6px}
.cv .lb{font-size:0.78em;font-weight:600;margin-bottom:4px}
.sn{display:none;margin-top:6px}
.sn.on{display:block}
.arr{font-size:12px;color:#6b7280;margin-left:4px;transition:transform 0.2s;display:inline-block}
.arr.rt{transform:rotate(90deg)}
.footer{text-align:center;padding:20px;color:#9ca3af;font-size:0.78em}
.kw-sec{margin-bottom:16px}
.kw-sec h3{font-size:0.88em;margin-bottom:8px;cursor:pointer;padding:4px 0}
.kw-sec h3:hover{opacity:0.8}
.kw-bar{display:flex;align-items:center;gap:6px;margin:2px 0}
.kw-bar .nm{width:48px;font-size:0.78em;color:#374151;text-align:right;flex-shrink:0}
.kw-bar .bg{flex:1;height:14px;background:#eef1f5;border-radius:7px;overflow:hidden}
.kw-bar .fl{height:100%;border-radius:7px;transition:width 0.3s}
.kw-bar .ct{width:28px;font-size:0.75em;color:#6b7280;text-align:right}
.pi{cursor:pointer;padding:4px 8px;margin:2px 0;border-radius:4px;display:flex;justify-content:space-between;font-size:0.82em;background:#fafbfc}
.pi:hover{background:#eef4ff}
.pm{display:none;padding-left:12px;max-height:400px;overflow-y:auto}
.pm.on{display:block}
.pm .m{font-size:0.78em;color:#4b5563;padding:3px 6px;margin:1px 0;border-left:2px solid #d0d5dd;word-break:break-all}
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
var RD = null;
var CAT_NUMS = ['一','二','三','四','五','六','七','八','九','十','十一','十二','十三','十四','十五','十六','十七','十八','十九','二十','廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十','卅一','卅二','卅三','卅四','卅五','卅六','卅七','卅八','卅九','四十'];

function render(){
  var d = RD; if(!d) return;
  var h = '';

  // 头部
  var kct = 0;
  for(var k in d.kwFreq) kct++;
  h += '<div class="header"><h1>\u{1F4CA} QQ\u4FEE\u4ED9\u7FA4\u804A \u00B7 \u5F00\u670D\u9996\u65E5\u62A5\u544A</h1><p style="color:#6b7280;font-size:0.85em">' + d.totalMsgs + '\u6761\u6D88\u606F \u00B7 ' + d.totalUsers + '\u540D\u6D3B\u8DC3\u6210\u5458</p><div class="sg">';
  h += '<div class="sc"><div style="font-size:1.3em">\u{1F4AC}</div><div class="n">' + d.totalMsgs + '</div><div style="font-size:0.7em;color:#6b7280;margin-top:2px">\u6587\u672C\u6D88\u606F</div></div>';
  h += '<div class="sc"><div style="font-size:1.3em">\u{1F465}</div><div class="n">' + d.totalUsers + '</div><div style="font-size:0.7em;color:#6b7280;margin-top:2px">\u6D3B\u8DC3\u6210\u5458</div></div>';
  h += '<div class="sc"><div style="font-size:1.3em">\u{1F3F7}\uFE0F</div><div class="n">' + kct + '</div><div style="font-size:0.7em;color:#6b7280;margin-top:2px">\u5173\u952E\u8BCD\u5206\u7C7B</div></div>';
  h += '<div class="sc"><div style="font-size:1.3em">\u{1F60A}</div><div class="n">' + Object.keys(d.psychs).length + '</div><div style="font-size:0.7em;color:#6b7280;margin-top:2px">\u5FC3\u7406\u5206\u6790</div></div>';
  h += '</div></div>';

  // 时段柱状图
  var hrs = Object.keys(d.hourly);
  var hvs = Object.values(d.hourly);
  var mh = Math.max.apply(null, hvs);
  h += '<div class="cg"><div class="se"><h2>\u{1F4C8} \u65F6\u6BB5\u6D3B\u8DC3\u66F2\u7EBF</h2><div style="display:flex;align-items:flex-end;height:150px;padding:0 8px">';
  for(var i=0;i<hrs.length;i++){
    var p = hvs[i]/mh*100;
    h += '<div style="flex:1;display:flex;flex-direction:column;align-items:center;height:150px;justify-content:flex-end"><div style="font-size:10px;color:#2c3e50;font-weight:600;margin-bottom:2px">' + hvs[i] + '</div><div style="width:80%;max-width:32px;height:' + p + '%;background:linear-gradient(180deg,#4a9bc7,#1a6bb5);border-radius:4px 4px 2px 2px"></div><div style="font-size:9px;color:#6b7280;margin-top:4px">' + hrs[i] + ':00</div></div>';
  }
  h += '</div></div>';

  // 关键词分布
  var KC = d.kwCats || {};
  var KF = d.kwFreq || {};
  h += '<div class="se"><h2>\u{1F511} \u5173\u952E\u8BCD\u5206\u5E03</h2>';
  var catNames = Object.keys(KF);
  var maxCat = 0;
  for(var i=0;i<catNames.length;i++){
    var items = KF[catNames[i]];
    var total = 0;
    for(var j=0;j<items.length;j++) total += items[j][1];
    if(total > maxCat) maxCat = total;
  }
  for(var i=0;i<catNames.length;i++){
    var cn = catNames[i];
    var items = KF[cn];
    var total = 0;
    for(var j=0;j<items.length;j++) total += items[j][1];
    var color = (KC[cn]||{}).color || '#888';
    var w = total/maxCat*100;
    h += '<div style="display:flex;align-items:center;gap:6px;margin:5px 0"><span style="width:68px;font-size:0.78em;color:#374151;text-align:right;flex-shrink:0">' + cn + '</span><div style="flex:1;height:16px;background:#eef1f5;border-radius:6px;overflow:hidden"><div style="height:100%;width:' + w + '%;background:' + color + ';border-radius:6px"></div></div><span style="width:24px;font-size:0.74em;color:#6b7280;text-align:right">' + total + '</span></div>';
  }
  h += '</div>';

  // 热门话题
  h += '<div class="se"><h2>\u{1F525} \u70ED\u95E8\u8BDD\u9898</h2>';
  for(var i=0;i<d.topics.length;i++){
    var t = d.topics[i];
    var c = '#' + t.color.replace('#','');
    var convs = d.topicConvs[t.id]||[];
    h += '<div class="tc" style="border-left-color:' + c + '"><div class="tt" style="color:' + c + '" data-i="' + i + '" data-type="topic">' + t.title + ' <span class="arr">\u25B6</span> <span style="font-size:0.72em;color:#6b7280;font-weight:400">' + convs.length + '\u6BB5\u5BF9\u8BDD</span></div><div class="desc">' + t.desc + '</div><div class="sn" data-id="topic' + i + '">';
    for(var j=0;j<convs.length;j++){
      h += '<div class="cv"><div class="lb" style="color:' + c + '">\u{1F4CC} \u4F1A\u8BDD\u7247\u6BB5 ' + (j<CAT_NUMS.length?CAT_NUMS[j]:j+1) + '</div>' + convs[j] + '</div>';
    }
    h += '</div></div>';
  }
  h += '</div>';

  // 活跃成员
  h += '<div class="se"><h2>\u{1F464} \u6700\u6D3B\u8DC3\u6210\u5458</h2>';
  var bc = ['#FF6B35','#004E89','#E63946','#2A9D8F','#7B2D8E','#264653'];
  for(var i=0;i<d.topUsers.length;i++){
    var pct = d.topUsers[i][1]/d.topUsers[0][1]*100;
    h += '<div style="display:flex;align-items:center;gap:8px;margin:4px 0"><span style="width:56px;font-size:0.76em;color:#374151;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0">' + d.topUsers[i][0] + '</span><div style="flex:1;height:18px;background:#eef1f5;border-radius:9px;overflow:hidden"><div style="height:100%;width:' + pct + '%;background:' + bc[i] + ';border-radius:9px"></div></div><span style="width:20px;font-size:0.76em;color:#2980b9;font-weight:600;text-align:right">' + d.topUsers[i][1] + '</span></div>';
  }
  h += '</div>';

  // 反馈
  h += '<div class="se"><h2>\u{1F4DD} \u73A9\u5BB6\u53CD\u9988 \u4EA7\u54C1\u5EFA\u8BAE</h2>';
  for(var i=0;i<d.feedbacks.length;i++){
    var f = d.feedbacks[i];
    var convs = d.fbConvs[f.id]||[];
    h += '<div class="fb" data-i="' + i + '" data-type="fb"><div style="display:flex;justify-content:space-between;align-items:center"><div style="display:flex;gap:8px;align-items:flex-start;flex:1"><span>' + f.emoji + '</span><span style="font-size:0.82em;color:#4b5563"><b style="color:#dc2626">' + f.issue + '</b> <span style="color:#059669">' + (f.status||'') + '</span></span></div><span style="font-size:0.75em;color:#6b7280;background:#f0f2f5;padding:2px 8px;border-radius:10px">' + f.count + '\u6761 <span class="arr">\u25B6</span></span></div><div class="sn" data-id="fb' + i + '">';
    for(var j=0;j<convs.length;j++){
      h += '<div class="cv"><div class="lb" style="color:#6b7280">\u{1F4CC} \u4F1A\u8BDD\u7247\u6BB5 ' + (j<CAT_NUMS.length?CAT_NUMS[j]:j+1) + '</div>' + convs[j] + '</div>';
    }
    h += '</div></div>';
  }
  h += '</div>';

  // 关键词频次明细（真实数据）
  var catOrder = Object.keys(KF);
  h += '<div class="se"><h2>\u{1F524} \u5173\u952E\u8BCD\u9891\u6B21\u660E\u7EC6</h2>';
  h += '<div style="font-size:0.76em;color:#6b7280;margin-bottom:10px">\u6BCF\u4E2A\u5206\u7C7B\u4E0B\u5404\u5173\u952E\u8BCD\u51FA\u73B0\u6B21\u6570 \u00B7 \u70B9\u51FB\u67E5\u770B\u5404\u4EBA\u7269\u5177\u4F53\u8A00\u8BBA</div>';
  for(var ki=0;ki<catOrder.length;ki++){
    var cn2 = catOrder[ki];
    var items = KF[cn2];
    var color2 = (KC[cn2]||{}).color || '#888';
    var maxVal = items.length > 0 ? items[0][1] : 1;
    var people = d.kwPeople[cn2]||[];
    
    h += '<div class="kw-sec"><h3 style="color:' + color2 + '" data-i="' + ki + '" data-type="kw">' + cn2 + ' <span style="font-weight:400;font-size:0.78em;color:#6b7280">' + items.length + '\u4E2A\u5173\u952E\u8BCD \u00B7 ' + people.length + '\u4EBA \u70B9\u51FB\u67E5\u770B\u4EBA\u7269 <span class="arr">\u25B6</span></span></h3>';
    // 子词进度条
    for(var b=0;b<items.length;b++){
      var wb = items[b][1]/maxVal*100;
      h += '<div class="kw-bar"><span class="nm">' + items[b][0] + '</span><div class="bg"><div class="fl" style="width:' + wb + '%;background:' + color2 + '"></div></div><span class="ct">' + items[b][1] + '\u6B21</span></div>';
    }
    // 人物分布
    h += '<div class="sn" data-id="kw' + ki + '" style="margin-top:6px;border-top:1px dashed #e0e4e8;padding-top:6px">';
    for(var p=0;p<people.length;p++){
      h += '<div class="pi" data-ki="' + ki + '" data-pi="' + p + '" data-type="person"><span>' + people[p].user + '</span><span style="color:#6b7280;font-size:0.78em">' + (people[p].msgs||[]).length + '\u6761 <span class="arr" style="font-size:10px">\u25B6</span></span></div>';
      h += '<div class="pm" data-id="pm' + ki + '_' + p + '">';
      var msgs = people[p].msgs||[];
      for(var m=0;m<msgs.length;m++){
        h += '<div class="m">' + msgs[m] + '</div>';
      }
      h += '</div>';
    }
    h += '</div></div>';
  }
  h += '</div>';

  // 心理分析
  h += '<div class="se"><h2>\u{1F9E0} \u73A9\u5BB6\u53CD\u9988\u4E0E\u5FC3\u7406\u5206\u6790</h2><div class="pg">';
  for(var i=0;i<d.psychs.length;i++){
    var p = d.psychs[i];
    var convs = d.psychConvs[p.name]||[];
    h += '<div class="pc" style="border-left-color:' + p.color + '"><div class="pn" style="color:' + p.color + '">' + p.name + ' <span style="font-weight:400;font-size:0.78em;color:#6b7280">' + convs.length + '\u6BB5</span></div><div class="pd">' + p.desc + '</div><div style="cursor:pointer;font-size:0.78em;color:#2980b9" data-i="' + i + '" data-type="psych">\u67E5\u770B\u5BF9\u8BDD\u573A\u666F <span class="arr">\u25B6</span></div><div class="sn" data-id="psych' + i + '">';
    for(var j=0;j<convs.length;j++){
      h += '<div class="cv"><div class="lb" style="color:' + p.color + '">\u{1F4CC} \u4F1A\u8BDD\u7247\u6BB5 ' + (j<CAT_NUMS.length?CAT_NUMS[j]:j+1) + '</div>' + convs[j] + '</div>';
    }
    h += '</div></div>';
  }
  h += '</div></div>';

  // 游戏冷知识
  var tips = [['\u{1F3AB} \u5151\u6362\u7801','VIP666 / VIP777 / VIP888'],['\u{1F511} \u6697\u53F7\u53E3\u4EE4','\u963F\u7239\u7B11\u62CD\u6211\u8170\u7537\u513F\u7ACB\u5FD7\u5728\u8FDC\u65B9'],['\u{1F3AF} \u524D\u671F\u7B56\u7565','\u96C6\u4E2D\u517B1\u4E2A\u4E3B\u529B\u5E26\u5168\u5C5E\u6027\u8BCD\u6761'],['\u26A1 \u8D44\u8D28\u7384\u5B66','\u522B\u8FDE\u70B9\uFF0C\u70B9\u4E00\u6B21\u9000\u51FA\u6765\u518D\u70B9'],['\u{1F3E0} 10\u8FDE\u91C7\u96C6','\u5B97\u95E88\u7EA7\u89E3\u950110\u8FDE\u4E0D\u7528\u6708\u5361'],['\u2694\uFE0F \u56FD\u6218\u89C4\u5219','1\u4EBA\u63A71\u4E2A\u4FEE\u58EB\u6B7B\u4E86\u53EF\u91CD\u8FDB'],['\u{1F3C6} \u4F20\u529F\u4F4D\u7F6E','\u5B97\u7940NPC\u738B\u957F\u751F\u521B\u89D224\u5C0F\u65F6'],['\u{1F4D6} \u89E3\u9501\u5C0F\u5929\u5E08','\u5148\u770B\u5B8C\u5267\u60C5\u624D\u80FD\u62BD\u76AE\u80A4']];
  h += '<div class="se"><h2>\u{1F4A1} \u6E38\u620F\u51B7\u77E5\u8BC6</h2><div class="tg">';
  for(var i=0;i<tips.length;i++){
    h += '<div class="ti"><div class="tl">' + tips[i][0] + '</div><div style="font-size:0.8em;color:#4b5563;margin-top:2px">' + tips[i][1] + '</div></div>';
  }
  h += '</div></div>';

  // 数据洞察
  h += '<div class="se"><h2>\u{1F4CA} \u6570\u636E\u6D1E\u5BDF</h2><div class="ig">';
  h += '<div style="background:#f8fafc;border-radius:10px;padding:12px;border:1px solid rgba(230,57,70,0.2)"><h3 style="font-size:0.85em;margin-bottom:8px;color:#E63946">\u{1F6A8} \u4E3B\u8981\u98CE\u9669\u9879</h3>';
  for(var i=0;i<d.risks.length;i++){
    var r = d.risks[i];
    var convs = d.riskConvs[r.id]||[];
    h += '<div class="ri"><div class="rt" data-i="' + i + '" data-type="risk">\u{1F534} ' + r.title + ' <span style="font-weight:400;font-size:0.78em;color:#6b7280">' + convs.length + '\u6BB5\u5BF9\u8BDD</span> <span class="arr">\u25B6</span></div><div class="rd">\u{1F4CB} ' + r.desc + '</div><div class="sn" data-id="risk' + i + '">';
    for(var j=0;j<convs.length;j++){
      h += '<div class="cv"><div class="lb" style="color:#E63946">\u{1F4CC} \u4F1A\u8BDD\u7247\u6BB5 ' + (j<CAT_NUMS.length?CAT_NUMS[j]:j+1) + '</div>' + convs[j] + '</div>';
    }
    h += '</div></div>';
  }
  h += '</div>';
  h += '<div style="background:#f8fafc;border-radius:10px;padding:12px;border:1px solid rgba(42,157,143,0.2)"><h3 style="font-size:0.85em;margin-bottom:8px;color:#2A9D8F">\u2705 \u53EF\u53D6\u4E4B\u5904</h3>';
  for(var i=0;i<d.goods.length;i++){
    var g = d.goods[i];
    var convs = d.goodConvs[g.id]||[];
    h += '<div class="ri"><div class="rt" data-i="' + i + '" data-type="good">\u{1F7E2} ' + g.title + ' <span style="font-weight:400;font-size:0.78em;color:#6b7280">' + convs.length + '\u6BB5\u5BF9\u8BDD</span> <span class="arr">\u25B6</span></div><div class="rd">\u{1F4CB} ' + g.desc + '</div><div class="sn" data-id="good' + i + '">';
    for(var j=0;j<convs.length;j++){
      h += '<div class="cv"><div class="lb" style="color:#2A9D8F">\u{1F4CC} \u4F1A\u8BDD\u7247\u6BB5 ' + (j<CAT_NUMS.length?CAT_NUMS[j]:j+1) + '</div>' + convs[j] + '</div>';
    }
    h += '</div></div>';
  }
  h += '</div></div></div>';

  h += '<div class="footer"><p>\u{1F4CA} NapCatQQ \u7FA4\u804A\u8BB0\u5F55 \u00B7 \u6570\u636E\u9A71\u52A8\u751F\u6210</p></div>';
  document.getElementById('app').innerHTML = h;
}

// 事件委托
document.addEventListener('click', function(e){
  var target = e.target.closest('[data-type]');
  if(!target) return;
  var type = target.getAttribute('data-type');

  if(type === 'topic'){
    var i = target.getAttribute('data-i');
    var sn = document.querySelector('[data-id="topic' + i + '"]');
    if(sn) sn.classList.toggle('on');
    var arr = target.querySelector('.arr');
    if(arr) arr.classList.toggle('rt');
  }
  else if(type === 'fb'){
    // 点击整条反馈展开
    var i = target.getAttribute('data-i');
    var sn = document.querySelector('[data-id="fb' + i + '"]');
    if(sn) sn.classList.toggle('on');
    var arr = target.querySelector('.arr');
